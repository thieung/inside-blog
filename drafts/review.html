<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoClaw Blog — Draft Review Portal</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f11; --surface: #18181b; --surface2: #222225; --border: #2e2e32;
  --text: #e4e4e7; --muted: #71717a; --dim: #52525b;
  --amber: #f59e0b; --green: #22c55e; --red: #ef4444; --blue: #3b82f6;
  --sans: 'Outfit', system-ui, sans-serif; --mono: 'JetBrains Mono', monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; }

/* HEADER */
.header {
  padding: 20px 32px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.header h1 { font-size: 18px; font-weight: 600; }
.header h1 span { color: var(--amber); }
.header-stats { display: flex; gap: 16px; font-family: var(--mono); font-size: 12px; }
.stat { display: flex; align-items: center; gap: 6px; }
.stat-dot { width: 8px; height: 8px; border-radius: 50%; }
.stat-dot.pending { background: var(--amber); }
.stat-dot.approved { background: var(--green); }
.stat-dot.rejected { background: var(--red); }

/* LAYOUT */
.layout { display: flex; height: calc(100vh - 65px); }

/* SIDEBAR */
.sidebar {
  width: 340px; border-right: 1px solid var(--border); overflow-y: auto;
  flex-shrink: 0;
}
.sidebar-section {
  padding: 12px 16px; font-family: var(--mono); font-size: 10px;
  text-transform: uppercase; letter-spacing: 0.12em; color: var(--dim);
  border-bottom: 1px solid var(--border); position: sticky; top: 0;
  background: var(--bg); z-index: 1;
}
.draft-item {
  padding: 14px 16px; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background 0.15s; position: relative;
}
.draft-item:hover { background: var(--surface); }
.draft-item.active { background: var(--surface2); border-left: 3px solid var(--amber); }
.draft-version {
  font-family: var(--mono); font-size: 11px; font-weight: 600;
  margin-bottom: 4px;
}
.draft-version.v-published { color: var(--green); }
.draft-version.v-draft { color: var(--amber); }
.draft-title { font-size: 13px; font-weight: 500; line-height: 1.4; margin-bottom: 6px; }
.draft-meta { display: flex; align-items: center; gap: 8px; }
.draft-status {
  font-family: var(--mono); font-size: 10px; padding: 2px 8px;
  border-radius: 4px; font-weight: 600;
}
.draft-status.pending { background: rgba(245,158,11,0.12); color: var(--amber); }
.draft-status.approved { background: rgba(34,197,94,0.12); color: var(--green); }
.draft-status.rejected { background: rgba(239,68,68,0.12); color: var(--red); }
.draft-status.published { background: rgba(59,130,246,0.12); color: var(--blue); }
.draft-lines { font-family: var(--mono); font-size: 10px; color: var(--dim); }

/* MAIN */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* TOOLBAR */
.toolbar {
  padding: 12px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px; background: var(--surface);
}
.toolbar-title { font-size: 14px; font-weight: 600; flex: 1; }
.toolbar-btn {
  font-family: var(--mono); font-size: 11px; padding: 6px 16px;
  border-radius: 6px; border: 1px solid var(--border);
  background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s;
}
.toolbar-btn:hover { border-color: var(--muted); color: var(--text); }
.toolbar-btn.approve { border-color: var(--green); color: var(--green); }
.toolbar-btn.approve:hover { background: var(--green); color: #000; }
.toolbar-btn.reject { border-color: var(--red); color: var(--red); }
.toolbar-btn.reject:hover { background: var(--red); color: #fff; }
.toolbar-btn.publish { border-color: var(--blue); color: var(--blue); }
.toolbar-btn.publish:hover { background: var(--blue); color: #fff; }
.toolbar-btn:disabled { opacity: 0.3; cursor: default; }
.toolbar-sep { width: 1px; height: 20px; background: var(--border); }
.view-toggle {
  display: flex; border-radius: 6px; overflow: hidden; border: 1px solid var(--border);
}
.view-btn {
  padding: 5px 12px; font-family: var(--mono); font-size: 11px;
  background: transparent; color: var(--dim); border: none; cursor: pointer;
}
.view-btn.active { background: var(--surface2); color: var(--text); }

/* PREVIEW */
.preview { flex: 1; background: #000; position: relative; overflow: hidden; }
.preview iframe { border: none; width: 100%; height: 100%; }
.preview-desktop iframe { transform-origin: top left; }
.preview-mobile { display: flex; justify-content: center; align-items: flex-start; padding: 20px; overflow-y: auto; }
.mobile-frame {
  width: 390px; height: 844px; border: 3px solid var(--border);
  border-radius: 40px; overflow: hidden; background: #000; flex-shrink: 0;
  box-shadow: 0 0 40px rgba(0,0,0,0.5);
}
.mobile-frame iframe { width: 390px; height: 844px; border: none; }

/* EMPTY */
.empty-state {
  flex: 1; display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 12px; color: var(--dim);
}
.empty-state svg { width: 48px; height: 48px; opacity: 0.3; }
.empty-state p { font-size: 14px; }

/* NOTES */
.notes-panel {
  border-top: 1px solid var(--border); padding: 12px 20px;
  background: var(--surface); display: none;
}
.notes-input {
  width: 100%; padding: 8px 12px; background: var(--bg); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text); font-family: var(--sans); font-size: 13px;
  resize: none; outline: none;
}
.notes-input:focus { border-color: var(--amber); }
.notes-label { font-family: var(--mono); font-size: 10px; color: var(--dim); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.1em; }
</style>
</head>
<body>

<div class="header">
  <h1>GoClaw Blog — <span>Draft Review</span></h1>
  <div class="header-stats" id="headerStats"></div>
</div>

<div class="layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="main" id="main">
    <div class="empty-state">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
      <p>Select a post to review</p>
    </div>
  </div>
</div>

<script>
// Post registry — add new posts here
const POSTS = [
  // Published
  { slug: 'codex-oauth-pools', title: 'Codex OAuth Pools — Smart Token Routing', version: 'v2.34.0', status: 'published', path: '../posts/codex-oauth-pools.html', lines: 677 },
  { slug: 'yield-mention-mode', title: 'Yield Mention Mode — Smart Turn Yielding', version: 'v2.24.0', status: 'published', path: '../posts/yield-mention-mode.html', lines: 570 },
  // Drafts (review needed)
  { slug: 'force-directed-knowledge-graphs', title: 'Force-Directed Knowledge Graphs', version: 'v2.47.0', status: 'draft', path: 'force-directed-knowledge-graphs.html', lines: 680 },
  { slug: 'image-gallery-session-state', title: 'Image Gallery & Session State', version: 'v2.21.0', status: 'draft', path: 'image-gallery-session-state.html', lines: 350 },
  { slug: 'semantic-memory-chunk-overlap', title: 'Semantic Memory Chunk Overlap', version: 'v2.19.0', status: 'draft', path: 'semantic-memory-chunk-overlap.html', lines: 320 },
  { slug: 'desktop-edition-goclaw-lite', title: 'Desktop Edition — GoClaw Lite', version: 'v2.18.0+', status: 'draft', path: 'desktop-edition-goclaw-lite.html', lines: 1120 },
  { slug: 'embedding-dimensions-multi-provider', title: 'Embedding Dimensions Multi-Provider', version: 'v2.18.0', status: 'draft', path: 'embedding-dimensions-multi-provider.html', lines: 360 },
  { slug: 'browser-automation-resource-limits', title: 'Browser Automation Resource Limits', version: 'v2.17.0', status: 'draft', path: 'browser-automation-resource-limits.html', lines: 310 },
  { slug: 'knowledge-graph-integration', title: 'Knowledge Graph Integration', version: 'v2.15.0+', status: 'draft', path: 'knowledge-graph-integration.html', lines: 1318 },
  { slug: 'realtime-team-task-notifications', title: 'Real-Time Team Task Notifications', version: 'v2.14.0', status: 'draft', path: 'realtime-team-task-notifications.html', lines: 330 },
  { slug: 'file-upload-workspace', title: 'File Upload to Workspace', version: 'v2.10.0', status: 'draft', path: 'file-upload-workspace.html', lines: 355 },
  { slug: 'system-settings-dashboard', title: 'System Settings Dashboard', version: 'v2.9.0', status: 'draft', path: 'system-settings-dashboard.html', lines: 400 },
  { slug: 'agent-teams-task-board', title: 'Agent Teams & Task Board', version: 'v2.8.0+', status: 'draft', path: 'agent-teams-task-board.html', lines: 1205 },
  { slug: 'task-lifecycle-state-machine', title: 'Task Lifecycle State Machine', version: 'v2.8.0', status: 'draft', path: 'task-lifecycle-state-machine.html', lines: 350 },
];

let activeSlug = null;
let viewMode = 'desktop';

function getStatus(slug) {
  return localStorage.getItem('review-' + slug) || POSTS.find(p => p.slug === slug)?.status || 'draft';
}
function setStatus(slug, status) {
  localStorage.setItem('review-' + slug, status);
  renderSidebar();
  renderToolbar();
  updateStats();
}
function getNotes(slug) {
  return localStorage.getItem('notes-' + slug) || '';
}
function setNotes(slug, text) {
  localStorage.setItem('notes-' + slug, text);
}

function updateStats() {
  const counts = { published: 0, approved: 0, pending: 0, rejected: 0, draft: 0 };
  POSTS.forEach(p => { const s = getStatus(p.slug); counts[s] = (counts[s] || 0) + 1; });
  document.getElementById('headerStats').innerHTML = [
    { label: 'Published', count: counts.published, cls: 'approved' },
    { label: 'Approved', count: counts.approved, cls: 'approved' },
    { label: 'Pending', count: counts.pending + counts.draft, cls: 'pending' },
    { label: 'Rejected', count: counts.rejected, cls: 'rejected' },
  ].map(s => `<div class="stat"><span class="stat-dot ${s.cls}"></span>${s.count} ${s.label}</div>`).join('');
}

function renderSidebar() {
  const published = POSTS.filter(p => getStatus(p.slug) === 'published');
  const drafts = POSTS.filter(p => getStatus(p.slug) !== 'published');
  let html = '';
  if (published.length) {
    html += `<div class="sidebar-section">Published (${published.length})</div>`;
    html += published.map(p => renderDraftItem(p)).join('');
  }
  html += `<div class="sidebar-section">Drafts (${drafts.length})</div>`;
  html += drafts.map(p => renderDraftItem(p)).join('');
  document.getElementById('sidebar').innerHTML = html;
  document.querySelectorAll('.draft-item').forEach(el => {
    el.addEventListener('click', () => selectPost(el.dataset.slug));
  });
}

function renderDraftItem(p) {
  const status = getStatus(p.slug);
  const statusLabel = status === 'draft' ? 'pending' : status;
  return `<div class="draft-item ${p.slug === activeSlug ? 'active' : ''}" data-slug="${p.slug}">
    <div class="draft-version ${status === 'published' ? 'v-published' : 'v-draft'}">${p.version}</div>
    <div class="draft-title">${p.title}</div>
    <div class="draft-meta">
      <span class="draft-status ${statusLabel}">${statusLabel}</span>
      <span class="draft-lines">${p.lines} lines</span>
    </div>
  </div>`;
}

function selectPost(slug) {
  activeSlug = slug;
  const post = POSTS.find(p => p.slug === slug);
  renderSidebar();
  renderToolbar();
  renderPreview(post);
}

function renderToolbar() {
  const post = POSTS.find(p => p.slug === activeSlug);
  if (!post) return;
  const status = getStatus(post.slug);
  const isPublished = status === 'published';
  document.getElementById('main').innerHTML = `
    <div class="toolbar">
      <div class="toolbar-title">${post.title} <span style="color:var(--dim);font-family:var(--mono);font-size:11px;margin-left:8px">${post.version}</span></div>
      <div class="view-toggle">
        <button class="view-btn ${viewMode === 'desktop' ? 'active' : ''}" onclick="setView('desktop')">Desktop</button>
        <button class="view-btn ${viewMode === 'mobile' ? 'active' : ''}" onclick="setView('mobile')">Mobile</button>
      </div>
      <div class="toolbar-sep"></div>
      ${isPublished ? '<span style="font-family:var(--mono);font-size:11px;color:var(--green)">PUBLISHED</span>' : `
        <button class="toolbar-btn approve ${status === 'approved' ? '' : ''}" onclick="setStatus('${post.slug}','approved')">Approve</button>
        <button class="toolbar-btn reject" onclick="setStatus('${post.slug}','rejected')">Reject</button>
        ${status === 'approved' ? `<div class="toolbar-sep"></div><button class="toolbar-btn publish" onclick="publishPost('${post.slug}')">Publish</button>` : ''}
      `}
    </div>
    <div class="preview ${viewMode === 'mobile' ? 'preview-mobile' : 'preview-desktop'}" id="previewArea"></div>
    <div class="notes-panel" id="notesPanel" style="display:flex;flex-direction:column;gap:6px">
      <div class="notes-label">Review Notes</div>
      <textarea class="notes-input" rows="2" placeholder="Add review notes..." oninput="setNotes('${post.slug}', this.value)">${getNotes(post.slug)}</textarea>
    </div>`;
  renderPreview(post);
}

function renderPreview(post) {
  const area = document.getElementById('previewArea');
  if (!area) return;
  if (viewMode === 'mobile') {
    area.innerHTML = `<div class="mobile-frame"><iframe src="${post.path}"></iframe></div>`;
  } else {
    area.innerHTML = `<iframe src="${post.path}"></iframe>`;
  }
}

function setView(mode) {
  viewMode = mode;
  if (activeSlug) renderToolbar();
}

function publishPost(slug) {
  // Show instructions (can't actually move files from browser)
  alert('To publish "' + slug + '":\\n\\n1. Move: drafts/' + slug + '.html → posts/\\n2. Add entry to index.html\\n3. git commit && git push\\n\\nOr run in terminal:\\nmv drafts/' + slug + '.html posts/');
  setStatus(slug, 'published');
}

// Init
renderSidebar();
updateStats();
</script>
</body>
</html>
