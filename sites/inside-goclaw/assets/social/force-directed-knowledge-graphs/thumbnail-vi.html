<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1200px; height: 630px; overflow: hidden; font-family: 'Space Grotesk', system-ui, sans-serif; background: #080c12; position: relative; }
.bg { position: absolute; inset: 0; background: radial-gradient(ellipse 60% 50% at 30% 20%, rgba(232,160,32,0.12) 0%, transparent 60%), radial-gradient(ellipse 50% 40% at 75% 75%, rgba(232,160,32,0.06) 0%, transparent 50%); }
.grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(232,160,32,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(232,160,32,0.03) 1px, transparent 1px); background-size: 40px 40px; }
.accent-bar { position: absolute; left: 0; top: 0; bottom: 0; width: 5px; background: linear-gradient(180deg, #e8a020, #c4841a, #e8a020); }
.bg-logo { position: absolute; right: 40px; top: 50%; transform: translateY(-50%); width: 300px; height: 300px; opacity: 0.06; pointer-events: none; z-index: 0; }
/* Graph nodes */
.node { position: absolute; border-radius: 50%; border: 2px solid rgba(232,160,32,0.3); }
.node.n1 { width: 14px; height: 14px; top: 100px; left: 820px; background: rgba(232,160,32,0.25); }
.node.n2 { width: 10px; height: 10px; top: 180px; left: 920px; background: rgba(232,160,32,0.15); border-color: rgba(232,160,32,0.2); }
.node.n3 { width: 18px; height: 18px; top: 280px; left: 860px; background: rgba(232,160,32,0.35); }
.node.n4 { width: 8px; height: 8px; top: 160px; left: 1020px; background: rgba(232,160,32,0.12); border-color: rgba(232,160,32,0.15); }
.node.n5 { width: 12px; height: 12px; top: 350px; left: 960px; background: rgba(232,160,32,0.2); }
.node.n6 { width: 22px; height: 22px; top: 220px; left: 1060px; background: rgba(232,160,32,0.3); }
.node.n7 { width: 6px; height: 6px; top: 420px; left: 880px; background: rgba(232,160,32,0.1); border-color: rgba(232,160,32,0.12); }
.node.n8 { width: 10px; height: 10px; top: 310px; left: 1100px; background: rgba(232,160,32,0.15); }
/* Edges between nodes */
.edge { position: absolute; height: 1px; background: rgba(232,160,32,0.08); transform-origin: left center; }
.edge.e1 { top: 107px; left: 834px; width: 95px; transform: rotate(55deg); }
.edge.e2 { top: 185px; left: 930px; width: 100px; transform: rotate(-70deg); }
.edge.e3 { top: 289px; left: 878px; width: 110px; transform: rotate(35deg); }
.edge.e4 { top: 230px; left: 1070px; width: 85px; transform: rotate(70deg); }
.edge.e5 { top: 355px; left: 972px; width: 120px; transform: rotate(-20deg); }
.content { position: relative; z-index: 1; padding: 56px 72px; height: 100%; display: flex; flex-direction: column; justify-content: space-between; }
.top { display: flex; align-items: center; gap: 14px; }
.logo img { width: 44px; height: 44px; }
.brand { font-family: 'JetBrains Mono', monospace; font-size: 17px; font-weight: 600; color: rgba(255,255,255,0.85); }
.version { margin-left: auto; font-family: 'JetBrains Mono', monospace; font-size: 13px; color: #e8a020; background: rgba(232,160,32,0.1); border: 1px solid rgba(232,160,32,0.2); padding: 5px 14px; border-radius: 8px; font-weight: 600; }
.middle { flex: 1; display: flex; flex-direction: column; justify-content: center; }
.eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase; color: #e8a020; margin-bottom: 14px; opacity: 0.7; }
h1 { font-size: 52px; font-weight: 700; line-height: 1.1; color: #fff; max-width: 720px; letter-spacing: -0.02em; }
h1 .hl { color: #e8a020; }
.subtitle { margin-top: 18px; font-size: 17px; color: rgba(255,255,255,0.35); max-width: 620px; line-height: 1.5; font-weight: 400; }
.bottom { display: flex; align-items: center; gap: 10px; }
.tag { font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 4px 12px; border-radius: 6px; background: rgba(232,160,32,0.08); color: rgba(232,160,32,0.6); border: 1px solid rgba(232,160,32,0.12); }
.url { margin-left: auto; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: rgba(255,255,255,0.2); }
</style>
</head>
<body>
<div class="bg"></div>
<div class="grid"></div>
<img class="bg-logo" src="../goclaw-icon.svg" alt="">
<div class="accent-bar"></div>
<div class="node n1"></div><div class="node n2"></div><div class="node n3"></div><div class="node n4"></div>
<div class="node n5"></div><div class="node n6"></div><div class="node n7"></div><div class="node n8"></div>
<div class="edge e1"></div><div class="edge e2"></div><div class="edge e3"></div><div class="edge e4"></div><div class="edge e5"></div>
<div class="content">
  <div class="top">
    <div class="logo"><img src="../goclaw-icon.svg" alt=""></div>
    <div class="brand">GoClaw</div>
    <div class="version">v2.47.0</div>
  </div>
  <div class="middle">
    <div class="eyebrow">. Deep Dive</div>
    <h1><span class="hl">Knowledge Graph</span> cho AI Agents</h1>
    <div class="subtitle">Từ hội thoại đến bộ nhớ ngữ nghĩa — trích xuất, tìm kiếm kết hợp, trực quan hoá 3D</div>
  </div>
  <div class="bottom">
    <span class="tag">knowledge-graph</span>
    <span class="tag">hybrid-search</span>
    <span class="tag">three.js</span>
    <span class="url">goclaw.thieunv.space</span>
  </div>
</div>
</body>
</html>
