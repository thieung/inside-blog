<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1200px; height: 630px; overflow: hidden; font-family: 'Outfit', system-ui, sans-serif; background: #faf9f6; position: relative; }
.bg { position: absolute; inset: 0; background: radial-gradient(ellipse 60% 80% at 90% 50%, rgba(16,185,129,0.08) 0%, transparent 60%), radial-gradient(ellipse 50% 60% at 10% 80%, rgba(16,185,129,0.04) 0%, transparent 50%); }
.accent-bar { position: absolute; left: 0; top: 0; bottom: 0; width: 6px; background: linear-gradient(180deg, #10b981, #047857); }
.bg-logo { position: absolute; right: 40px; top: 50%; transform: translateY(-50%); width: 320px; height: 320px; opacity: 0.5; pointer-events: none; z-index: 0; }
.content { position: relative; z-index: 1; padding: 64px 80px; height: 100%; display: flex; flex-direction: column; justify-content: space-between; }
.top { display: flex; align-items: center; gap: 16px; }
.logo img { width: 48px; height: 48px; }
.brand { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 600; color: #0a0a08; }
.version { margin-left: auto; font-family: 'JetBrains Mono', monospace; font-size: 14px; color: #10b981; background: rgba(16,185,129,0.1); padding: 6px 16px; border-radius: 8px; font-weight: 600; }
.middle { flex: 1; display: flex; flex-direction: column; justify-content: center; }
.eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 13px; letter-spacing: 0.15em; text-transform: uppercase; color: #10b981; margin-bottom: 16px; }
h1 { font-family: 'Instrument Serif', Georgia, serif; font-size: 58px; font-weight: 400; line-height: 1.1; color: #0a0a08; max-width: 850px; }
h1 em { font-style: italic; color: #10b981; }
.subtitle { margin-top: 20px; font-size: 19px; color: #5a5648; max-width: 720px; line-height: 1.5; }
.bottom { display: flex; align-items: center; gap: 12px; }
.tag { font-family: 'JetBrains Mono', monospace; font-size: 12px; padding: 5px 14px; border-radius: 6px; background: rgba(16,185,129,0.08); color: #059669; }
.url { margin-left: auto; font-family: 'JetBrains Mono', monospace; font-size: 13px; color: #8a8478; }
</style>
</head>
<body>
<div class="bg"></div>
<img class="bg-logo" src="../../../public/goclaw-icon.svg" alt="">
<div class="accent-bar"></div>
<div class="content">
  <div class="top">
    <div class="logo"><img src="../../../public/goclaw-icon.svg" alt=""></div>
    <div class="brand">GoClaw</div>
    <div class="version">v2.56.0</div>
  </div>
  <div class="middle">
    <div class="eyebrow">Inside GoClaw</div>
    <h1>MCP <em>Hybrid Search</em> Mode</h1>
    <div class="subtitle">Giữ 40 tool inline, defer phần còn lại qua BM25 — cơ chế quản lý tool thông minh khi số lượng MCP tool vượt ngưỡng</div>
  </div>
  <div class="bottom">
    <span class="tag">MCP</span>
    <span class="tag">BM25</span>
    <span class="tag">Search</span>
    <span class="tag">Go</span>
    <span class="url">goclaw.thieunv.space</span>
  </div>
</div>
</body>
</html>
