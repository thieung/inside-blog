<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1200px; height: 630px; overflow: hidden; font-family: 'DM Sans', system-ui, sans-serif; background: #f5f0e8; position: relative; }
.bg { position: absolute; inset: 0; background: radial-gradient(ellipse 60% 80% at 90% 50%, rgba(196,74,43,0.08) 0%, transparent 60%), radial-gradient(ellipse 50% 60% at 10% 80%, rgba(26,107,90,0.06) 0%, transparent 50%); }
.accent-bar { position: absolute; left: 0; top: 0; bottom: 0; width: 6px; background: linear-gradient(180deg, #c44a2b, #1a6b5a); }
.bg-logo { position: absolute; right: 40px; top: 50%; transform: translateY(-50%); width: 320px; height: 320px; opacity: 0.5; pointer-events: none; z-index: 0; }
.content { position: relative; z-index: 1; padding: 64px 80px; height: 100%; display: flex; flex-direction: column; justify-content: space-between; }
.top { display: flex; align-items: center; gap: 16px; }
.logo img { width: 48px; height: 48px; }
.brand { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 600; color: #0a0a0c; }
.version { margin-left: auto; font-family: 'JetBrains Mono', monospace; font-size: 14px; color: #c44a2b; background: rgba(196,74,43,0.1); padding: 6px 16px; border-radius: 8px; font-weight: 600; }
.middle { flex: 1; display: flex; flex-direction: column; justify-content: center; }
.eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 13px; letter-spacing: 0.15em; text-transform: uppercase; color: #c44a2b; margin-bottom: 16px; }
h1 { font-family: 'Instrument Serif', Georgia, serif; font-size: 64px; font-weight: 400; line-height: 1.1; color: #0a0a0c; max-width: 800px; }
h1 em { font-style: italic; color: #c44a2b; }
.subtitle { margin-top: 20px; font-size: 20px; color: #6b5f50; max-width: 680px; line-height: 1.5; }
.bottom { display: flex; align-items: center; gap: 12px; }
.tag { font-family: 'JetBrains Mono', monospace; font-size: 12px; padding: 5px 14px; border-radius: 6px; background: rgba(26,107,90,0.08); color: #1a6b5a; }
.url { margin-left: auto; font-family: 'JetBrains Mono', monospace; font-size: 13px; color: #8a8478; }
</style>
</head>
<body>
<div class="bg"></div>
<img class="bg-logo" src="../goclaw-icon.svg" alt="">
<div class="accent-bar"></div>
<div class="content">
  <div class="top">
    <div class="logo"><img src="../goclaw-icon.svg" alt=""></div>
    <div class="brand">GoClaw</div>
    <div class="version">v2.34.0</div>
  </div>
  <div class="middle">
    <div class="eyebrow">Inside GoClaw</div>
    <h1>Codex OAuth <em>Pools</em></h1>
    <div class="subtitle">Smart Token Routing — Pool-based credential management with auto-rotation, health scoring and rate limit awareness</div>
  </div>
  <div class="bottom">
    <span class="tag">oauth</span>
    <span class="tag">credential-management</span>
    <span class="tag">multi-tenant</span>
    <span class="url">goclaw.thieunv.space</span>
  </div>
</div>
</body>
</html>
