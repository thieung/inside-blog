<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400;1,600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1200px; height: 630px; overflow: hidden; font-family: 'Crimson Pro', Georgia, serif; background: #0f0a1a; position: relative; }
.bg { position: absolute; inset: 0; background: radial-gradient(ellipse 60% 80% at 90% 50%, rgba(139,92,246,0.08) 0%, transparent 60%), radial-gradient(ellipse 50% 60% at 10% 80%, rgba(167,139,250,0.05) 0%, transparent 50%); }
.accent-bar { position: absolute; left: 0; top: 0; bottom: 0; width: 6px; background: linear-gradient(180deg, #8b5cf6, #a78bfa); }
.bg-logo { position: absolute; right: 40px; top: 50%; transform: translateY(-50%); width: 320px; height: 320px; opacity: 0.06; pointer-events: none; z-index: 0; }
.content { position: relative; z-index: 1; padding: 64px 80px; height: 100%; display: flex; flex-direction: column; justify-content: space-between; }
.top { display: flex; align-items: center; gap: 16px; }
.logo img { width: 48px; height: 48px; }
.brand { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 600; color: #ede9fe; }
.version { margin-left: auto; font-family: 'JetBrains Mono', monospace; font-size: 14px; color: #8b5cf6; background: rgba(139,92,246,0.12); padding: 6px 16px; border-radius: 8px; font-weight: 600; }
.middle { flex: 1; display: flex; flex-direction: column; justify-content: center; }
.eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 13px; letter-spacing: 0.15em; text-transform: uppercase; color: #8b5cf6; margin-bottom: 16px; }
h1 { font-family: 'Crimson Pro', Georgia, serif; font-size: 72px; font-weight: 600; line-height: 1.1; color: #ede9fe; max-width: 820px; }
h1 em { font-style: italic; color: #a78bfa; }
.subtitle { margin-top: 20px; font-size: 21px; color: #c4b5fd; max-width: 680px; line-height: 1.5; opacity: 0.85; font-weight: 400; }
.bottom { display: flex; align-items: center; gap: 12px; }
.tag { font-family: 'JetBrains Mono', monospace; font-size: 12px; padding: 5px 14px; border-radius: 6px; background: rgba(167,139,250,0.1); color: #a78bfa; }
.url { margin-left: auto; font-family: 'JetBrains Mono', monospace; font-size: 13px; color: #a78bfa; opacity: 0.5; }
</style>
</head>
<body>
<div class="bg"></div>
<img class="bg-logo" src="../goclaw-icon.svg" alt="">
<div class="accent-bar"></div>
<div class="content">
  <div class="top">
    <div class="logo"><img src="../goclaw-icon.svg" alt=""></div>
    <div class="brand">GoClaw</div>
    <div class="version">v2.15.0+</div>
  </div>
  <div class="middle">
    <div class="eyebrow">Inside GoClaw</div>
    <h1><em>Knowledge</em> Graph</h1>
    <div class="subtitle">Entity extraction, multi-hop traversal, semantic search with pgvector — turning conversations into structured knowledge</div>
  </div>
  <div class="bottom">
    <span class="tag">knowledge-graph</span>
    <span class="tag">pgvector</span>
    <span class="tag">entity-extraction</span>
    <span class="url">goclaw.thieunv.space</span>
  </div>
</div>
</body>
</html>
