<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1200px; height: 630px; overflow: hidden; font-family: 'Be Vietnam Pro', system-ui, sans-serif; background: #faf9f6; position: relative; }
.bg { position: absolute; inset: 0; background: radial-gradient(ellipse 70% 80% at 80% 40%, rgba(139,92,246,0.08) 0%, transparent 60%), radial-gradient(ellipse 50% 60% at 20% 70%, rgba(59,130,246,0.06) 0%, transparent 50%); }
.accent-bar { position: absolute; left: 0; top: 0; bottom: 0; width: 6px; background: linear-gradient(180deg, #8b5cf6, #3b82f6, #10b981); }
.nodes { position: absolute; inset: 0; pointer-events: none; z-index: 0; }
.node { position: absolute; width: 8px; height: 8px; border-radius: 50%; background: rgba(139,92,246,0.25); }
.node:nth-child(1) { top: 15%; left: 75%; width: 10px; height: 10px; background: rgba(139,92,246,0.3); }
.node:nth-child(2) { top: 30%; left: 85%; width: 6px; height: 6px; background: rgba(59,130,246,0.25); }
.node:nth-child(3) { top: 55%; left: 80%; width: 12px; height: 12px; background: rgba(16,185,129,0.25); }
.node:nth-child(4) { top: 70%; left: 90%; width: 7px; height: 7px; background: rgba(139,92,246,0.2); }
.node:nth-child(5) { top: 20%; left: 90%; width: 5px; height: 5px; background: rgba(59,130,246,0.2); }
.line { position: absolute; height: 1px; background: linear-gradient(90deg, rgba(139,92,246,0.15), rgba(59,130,246,0.08)); transform-origin: left center; }
.line:nth-child(6) { top: 18%; left: 77%; width: 100px; transform: rotate(25deg); }
.line:nth-child(7) { top: 35%; left: 82%; width: 80px; transform: rotate(50deg); }
.line:nth-child(8) { top: 55%; left: 82%; width: 110px; transform: rotate(-20deg); }
.content { position: relative; z-index: 1; padding: 64px 80px; height: 100%; display: flex; flex-direction: column; justify-content: space-between; }
.top { display: flex; align-items: center; gap: 12px; }
.author-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #8b5cf6, #3b82f6); display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; font-weight: 700; font-size: 16px; color: white; }
.author-name { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 600; color: #4a4540; }
.badge { margin-left: auto; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #7c3aed; background: rgba(139,92,246,0.08); padding: 6px 16px; border-radius: 8px; font-weight: 600; letter-spacing: 0.05em; }
.middle { flex: 1; display: flex; flex-direction: column; justify-content: center; }
.eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 13px; letter-spacing: 0.15em; text-transform: uppercase; color: #7c3aed; margin-bottom: 16px; }
h1 { font-family: 'Be Vietnam Pro', system-ui, sans-serif; font-size: 62px; font-weight: 700; line-height: 1.1; color: #1a1a1a; max-width: 750px; }
h1 em { font-style: normal; font-weight: 800; background: linear-gradient(135deg, #f59e0b, #ef4444, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.subtitle { margin-top: 20px; font-size: 19px; color: #6b6560; max-width: 680px; line-height: 1.5; }
.bottom { display: flex; align-items: center; gap: 12px; }
.tag { font-family: 'JetBrains Mono', monospace; font-size: 12px; padding: 5px 14px; border-radius: 6px; background: rgba(139,92,246,0.07); color: #7c3aed; border: 1px solid rgba(139,92,246,0.12); }
.url { margin-left: auto; font-family: 'JetBrains Mono', monospace; font-size: 13px; color: #a8a29e; }
</style>
</head>
<body>
<div class="bg"></div>
<div class="nodes">
  <div class="node"></div><div class="node"></div><div class="node"></div><div class="node"></div><div class="node"></div>
  <div class="line"></div><div class="line"></div><div class="line"></div>
</div>
<div class="accent-bar"></div>
<div class="content">
  <div class="top">
    <div class="badge">Substack</div>
  </div>
  <div class="middle">
    <div class="eyebrow">Phân tích</div>
    <h1>Xây <em>"bộ não thứ hai"</em> bằng LLM</h1>
    <div class="subtitle">Pattern LLM Wiki viral của Karpathy — từ personal setup đến multi-agent knowledge base</div>
  </div>
  <div class="bottom">
    <span class="tag">LLM Wiki</span>
    <span class="tag">Karpathy</span>
    <span class="tag">Knowledge Base</span>
    <span class="tag">GoClaw</span>
    <span class="url">thieunv.substack.com</span>
  </div>
</div>
</body>
</html>
